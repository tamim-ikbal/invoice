version: '3.8'

services:
  app:
    build: .
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      - postgres

  web:
    image: nginx:1.25-alpine
    ports:
      - '8000:80' # Access Nginx on port 8000
    volumes:
      - ./templates:/etc/nginx/templates
    environment:
      - NGINX_PORT=80
    depends_on:
      - app

  postgres:
    image: postgres:15-alpine
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: laravel_invoice
    ports:
      - '5432:5432'

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
